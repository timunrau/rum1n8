<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="robots" content="index,follow" />
    <style>@media(prefers-color-scheme:dark){html,body{background:#000}}</style>
    <style>
      .app-shell-fallback {
        min-height: 100vh;
        padding: max(2rem, env(safe-area-inset-top)) 1.25rem max(2rem, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at top left, rgba(222, 245, 231, 0.9), transparent 34%),
          linear-gradient(180deg, #f7f3ea 0%, #f2efe8 100%);
        color: #1f2937;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      }

      .app-shell-fallback__panel {
        max-width: 44rem;
        margin: 0 auto;
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 1.75rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 22px 50px rgba(15, 23, 42, 0.08);
      }

      .app-shell-fallback__eyebrow {
        margin: 0 0 0.75rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #0f766e;
      }

      .app-shell-fallback__title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
        color: #111827;
      }

      .app-shell-fallback__body {
        margin: 1rem 0 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 1.05rem;
        line-height: 1.7;
        color: #374151;
      }

      .app-shell-fallback__highlights {
        margin: 1.5rem 0 0;
        padding-left: 1.25rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
      }

      .app-shell-fallback__highlights li + li {
        margin-top: 0.5rem;
      }

      .app-shell-fallback__note {
        display: none;
        margin: 1.5rem 0 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.95rem;
        color: #4b5563;
      }

      @media (max-width: 640px) {
        .app-shell-fallback__panel {
          padding: 1.5rem;
          border-radius: 1.5rem;
        }
      }

      @media (prefers-color-scheme: dark) {
        .app-shell-fallback {
          background:
            radial-gradient(circle at top left, rgba(22, 101, 52, 0.34), transparent 34%),
            linear-gradient(180deg, #050816 0%, #0f172a 100%);
          color: #e5e7eb;
        }

        .app-shell-fallback__panel {
          border-color: rgba(148, 163, 184, 0.2);
          background: rgba(15, 23, 42, 0.82);
          box-shadow: 0 24px 60px rgba(2, 6, 23, 0.36);
        }

        .app-shell-fallback__eyebrow {
          color: #5eead4;
        }

        .app-shell-fallback__title {
          color: #f8fafc;
        }

        .app-shell-fallback__body,
        .app-shell-fallback__highlights,
        .app-shell-fallback__note {
          color: #cbd5e1;
        }
      }
    </style>
    <script>if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.querySelector('meta[name="theme-color"]').content='#000000'</script>
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <meta property="og:title" content="%SITE_TITLE%" />
    <meta property="og:description" content="%SITE_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%PRODUCT_NAME%" />
    <meta property="og:image" content="%SOCIAL_IMAGE_URL%" />
    <meta property="og:image:alt" content="%SOCIAL_IMAGE_ALT%" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_TITLE%" />
    <meta name="twitter:description" content="%SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%SOCIAL_IMAGE_URL%" />
    <meta name="twitter:image:alt" content="%SOCIAL_IMAGE_ALT%" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="%SITE_TITLE%" />
    <title>%SITE_TITLE%</title>
    %OPTIONAL_SITE_URL_TAGS%
    <script type="application/ld+json">%SITE_JSON_LD%</script>
  </head>
  <body>
    <noscript>
      <style>.app-shell-fallback__note{display:block}</style>
    </noscript>
    <div id="app">
      <main class="app-shell-fallback" aria-labelledby="app-shell-fallback-title">
        <section class="app-shell-fallback__panel">
          <p class="app-shell-fallback__eyebrow">rum1n8</p>
          <h1 id="app-shell-fallback-title" class="app-shell-fallback__title">%LANDING_HEADING%</h1>
          <p class="app-shell-fallback__body">%SITE_DESCRIPTION%</p>
          <p class="app-shell-fallback__body">%LANDING_BODY%</p>
          <ul class="app-shell-fallback__highlights">%LANDING_HIGHLIGHTS%</ul>
          <p class="app-shell-fallback__note">%NOSCRIPT_DESCRIPTION%</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
