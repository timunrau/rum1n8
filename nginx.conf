server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Revalidate the service worker so hosted releases reach installed clients.
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # TWA/PWA metadata must have an explicit manifest MIME type.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Never redirect or route Digital Asset Links through an HTML fallback.
    # This remains a 404 until a real release/Play fingerprint is published.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # WebDAV proxy - forward to proxy service
    location /api/webdav {
        proxy_pass http://webdav-proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward custom WebDAV target header
        proxy_set_header X-WebDAV-Target $http_x_webdav_target;
        # Forward all other headers
        proxy_pass_request_headers on;
        
        # WebDAV specific settings
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        # CORS headers (proxy should also add these, but adding here as backup)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK" always;
        add_header Access-Control-Allow-Headers * always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Expose-Headers "ETag, etag, OC-ETag, Content-Type, Content-Length" always;
        
        # Handle OPTIONS preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK" always;
            add_header Access-Control-Allow-Headers * always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Canonical public URLs
    location = /index.html {
        if ($request_uri ~ ^/index\.html(\?|$)) {
            return 301 /$is_args$args;
        }

        try_files /index.html =404;
    }

    location = /home {
        return 301 /;
    }

    location = /home/ {
        return 301 /;
    }

    location = /home/index.html {
        return 301 /;
    }

    location = /about {
        return 301 /$is_args$args;
    }

    location = /about/ {
        return 301 /$is_args$args;
    }

    location = /about/index.html {
        return 301 /$is_args$args;
    }

    location = /app/index.html {
        if ($request_uri ~ ^/app/index\.html(\?|$)) {
            return 301 /app/$is_args$args;
        }

        try_files /app/index.html =404;
    }

    location = /memorization-is-a-spiritual-life-hack/index.html {
        if ($request_uri ~ ^/memorization-is-a-spiritual-life-hack/index\.html(\?|$)) {
            return 301 /memorization-is-a-spiritual-life-hack/;
        }

        try_files /memorization-is-a-spiritual-life-hack/index.html =404;
    }

    location = /tips-for-memorizing-scripture/index.html {
        if ($request_uri ~ ^/tips-for-memorizing-scripture/index\.html(\?|$)) {
            return 301 /tips-for-memorizing-scripture/;
        }

        try_files /tips-for-memorizing-scripture/index.html =404;
    }

    location = /import/biblememory/index.html {
        if ($request_uri ~ ^/import/biblememory/index\.html(\?|$)) {
            return 301 /import/biblememory/$is_args$args;
        }

        try_files /import/biblememory/index.html =404;
    }

    # Serve /privacy as /privacy.html
    location = /privacy {
        rewrite ^ /privacy.html last;
    }

    location = /app {
        return 301 /app/$is_args$args;
    }

    location = /memorization-is-a-spiritual-life-hack {
        return 301 /memorization-is-a-spiritual-life-hack/;
    }

    location = /tips-for-memorizing-scripture {
        return 301 /tips-for-memorizing-scripture/;
    }

    location = /import/biblememory {
        return 301 /import/biblememory/;
    }

    # Keep app navigations on the app shell, but do not let unrelated missing
    # marketing URLs masquerade as the canonical home page.
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
