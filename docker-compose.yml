services:
  bible-memory:
    image: ghcr.io/timunrau/bible-memory:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bible-memory
    ports:
      - "1234:80"
    restart: unless-stopped
    depends_on:
      - webdav-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  webdav-proxy:
    image: ghcr.io/timunrau/bible-memory-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: bible-memory-proxy
    restart: unless-stopped
    environment:
      - PROXY_PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_ROLLING_RESTART=true
    command: bible-memory bible-memory-proxy
