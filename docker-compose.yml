services:
  rum1n8:
    image: ghcr.io/timunrau/rum1n8:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rum1n8
    ports:
      - "1234:80"
    restart: unless-stopped
    depends_on:
      - webdav-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  webdav-proxy:
    image: ghcr.io/timunrau/rum1n8-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: rum1n8-proxy
    restart: unless-stopped
    environment:
      - PROXY_PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_ROLLING_RESTART=true
    command: rum1n8 rum1n8-proxy
