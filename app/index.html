<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="robots" content="%META_ROBOTS%" />
    <meta name="description" content="%PAGE_DESCRIPTION%" />
    %HEAD_CANONICAL_TAGS%
    %HEAD_SOCIAL_TAGS%
    %HEAD_JSON_LD%
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400;1,7..72,500;1,7..72,600&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    />
    <title>%PAGE_TITLE%</title>
    <style>@media(prefers-color-scheme:dark){html,body{background:#08101b}}</style>
  </head>
  <body>
    <noscript>
      <main style="min-height:100vh;padding:2rem;background:#f7f3ea;color:#1f2937;font-family:'Literata','Noto Serif',Georgia,Cambria,'Times New Roman',Times,serif;">
        <section style="max-width:42rem;margin:0 auto;padding:2rem;border:1px solid rgba(148,163,184,.22);border-radius:1.75rem;background:rgba(255,255,255,.92);box-shadow:0 22px 50px rgba(15,23,42,.08);">
          <p style="margin:0 0 .75rem;font-family:'Source Sans 3','Noto Sans','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#0f766e;">rum1n8</p>
          <h1 style="margin:0;font-size:clamp(2rem,4vw,3.25rem);line-height:1.05;color:#111827;">JavaScript is required to use the app</h1>
          <p style="margin:1rem 0 0;font-family:'Source Sans 3','Noto Sans','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:1.05rem;line-height:1.7;color:#374151;">The app itself lives here at <strong>/app</strong>. If you want the public site instead, open <a href="/" style="color:#305fb8;">rum1n8 home</a>.</p>
        </section>
      </main>
    </noscript>
    <div id="app"></div>
    <script>if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.querySelector('meta[name="theme-color"]').content='#08101b'</script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
