name: Deploy

on:
  push:
    branches: [main]

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml

  e2e-tests:
    uses: ./.github/workflows/e2e.yml

  build-and-push:
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push rum1n8
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/timunrau/rum1n8:latest
            ghcr.io/timunrau/rum1n8:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push webdav-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.proxy
          push: true
          tags: |
            ghcr.io/timunrau/rum1n8-proxy:latest
            ghcr.io/timunrau/rum1n8-proxy:${{ github.sha }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy
