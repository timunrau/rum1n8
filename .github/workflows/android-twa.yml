name: Android TWA

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: android-twa/**/*.gradle*

      - name: Install dependencies
        run: |
          npm ci
          npm run twa:setup

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Regenerate and verify the TWA project
        run: npm run twa:update

      - name: Assemble debug APK
        working-directory: android-twa
        run: ./gradlew --no-daemon assembleDebug

      - name: Verify APK identity and signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose android-twa/app/build/outputs/apk/debug/app-debug.apk
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging android-twa/app/build/outputs/apk/debug/app-debug.apk | sed -n '1,4p'

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rum1n8-twa-debug-${{ github.sha }}
          path: android-twa/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
