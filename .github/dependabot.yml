version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-patch-minor:
        update-types:
          - patch
          - minor
      npm-major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker:
        patterns:
          - "*"
