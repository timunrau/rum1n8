version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    cooldown:
      default-days: 3
      semver-major-days: 30
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      npm-major:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    cooldown:
      default-days: 3
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    cooldown:
      default-days: 3
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      docker-major:
        patterns:
          - "*"
        update-types:
          - major
