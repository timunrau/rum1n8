version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-production-patch-minor:
        dependency-type: production
        update-types:
          - patch
          - minor
      npm-development-patch-minor:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Winnipeg
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
